name: Build Windows exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build exe
        run: uv run build.py

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: VideoCompressor-windows
          path: dist/VideoCompressor.exe
