name: Build Windows exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build exe
        run: uv run build.py

      - name: Create release and upload exe
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VideoCompressor.exe
